<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Staff Portal</title>
    <link rel="stylesheet" href="staff_portal_style.css">
    <link rel="stylesheet" href="change-password.css">
</head>
<body>
    <div class="change-password-container">
        <div class="change-password-card">
            <h1>Change Password</h1>
            <p class="subtitle">Update your password securely</p>
            
            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        readonly
                        class="readonly-field"
                    >
                    <small class="help-text">Your username cannot be changed</small>
                </div>

                <div class="form-group">
                    <label for="currentPassword">Current Password:</label>
                    <div class="password-input-group">
                        <input 
                            type="password" 
                            id="currentPassword" 
                            name="currentPassword" 
                            placeholder="Enter your current password"
                            required
                        >
                        <button type="button" class="toggle-password" data-target="currentPassword">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password:</label>
                    <div class="password-input-group">
                        <input 
                            type="password" 
                            id="newPassword" 
                            name="newPassword" 
                            placeholder="Enter new password"
                            required
                        >
                        <button type="button" class="toggle-password" data-target="newPassword">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <small class="help-text">Minimum 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password:</label>
                    <div class="password-input-group">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Confirm new password"
                            required
                        >
                        <button type="button" class="toggle-password" data-target="confirmPassword">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                </div>

                <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
                <div id="successMessage" class="alert alert-success" style="display: none;"></div>

                <button type="submit" class="btn btn-primary btn-block">Change Password</button>
                <button type="button" class="btn btn-secondary btn-block" onclick="goBackToDashboard()">
                    Cancel
                </button>
            </form>

            <div class="password-requirements">
                <h3>Password Requirements:</h3>
                <ul>
                    <li>Minimum 6 characters</li>
                    <li>Cannot be the same as your current password</li>
                    <li>Passwords must match in confirmation field</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="change-password.js"></script>
</body>
</html>
